# =============================================================
# application-prod.properties — Production Profile
# Activated when: SPRING_PROFILES_ACTIVE=prod
# All secrets are injected as environment variables by Render
# NEVER hardcode credentials here!
# =============================================================

server.port=${PORT:8080}

# ── TiDB Cloud ───────────────────────────────────────────────
# These env vars are set in Render → Environment section
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── HikariCP Connection Pool ─────────────────────────────────
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ── JPA / Hibernate ──────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# ── CORS ─────────────────────────────────────────────────────
# Set to your actual Vercel frontend URL
allowed.origins=${ALLOWED_ORIGINS:https://yash-portfolio-react-kappa.vercel.app}

# ── Logging ───────────────────────────────────────────────────
logging.level.com.portfolio=INFO
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.web.cors=TRACE
logging.level.org.hibernate=WARN

# ── Actuator (Health Checks) ─────────────────────────────────
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=when-authorized
management.health.defaults.enabled=true

# ── Proxy Headers (Render/Railway/Heroku) ────────────────────
server.forward-headers-strategy=native

# ── Enhanced Logging for CORS Debugging ──────────────────────
logging.level.org.springframework.web.servlet.DispatcherServlet=DEBUG
logging.level.org.springframework.web.servlet.mvc.method.annotation.RequestMappingHandlerMapping=DEBUG
