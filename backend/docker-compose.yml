version: "3.9"

# ============================================================
# docker-compose.yml — LOCAL DEVELOPMENT with TiDB Cloud
# Uses the same TiDB Cloud database as production.
# Run with: docker compose up --build
# ============================================================

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: yaswanth2403/portfolio-backend:latest
    container_name: portfolio-backend
    ports:
      - "8080:8080"
    environment:
      # ── Spring Profile ─────────────────────────────────────
      SPRING_PROFILES_ACTIVE: prod

      # ── TiDB Cloud Credentials ─────────────────────────────
      # For local dev, you can either use .env file or set these directly.
      # Use a .env file (not committed to git) to override these values.
      DB_URL: ${DB_URL}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}

      # ── CORS ───────────────────────────────────────────────
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:5173}

      # ── JVM Memory Tuning ──────────────────────────────────
      JAVA_TOOL_OPTIONS: "-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0"

    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
