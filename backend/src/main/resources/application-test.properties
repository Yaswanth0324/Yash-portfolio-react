# =============================================================
# application-test.properties — Test Profile (CI/CD)
# Activated when: SPRING_PROFILES_ACTIVE=test
# Uses H2 in-memory DB — no real DB connection required
# =============================================================

# H2 in-memory database (available in pom.xml as test scope)
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate — auto-create schema from entities
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Disable open-in-view
spring.jpa.open-in-view=false

# CORS — allow all for tests
allowed.origins=http://localhost:5173

# Logging
logging.level.com.portfolio=WARN
logging.level.org.springframework=WARN
