# =============================================================
# GitHub Actions CI/CD Pipeline
# Portfolio Backend — Spring Boot + Docker + Render
# =============================================================
#
# FLOW OVERVIEW:
#   Push to main ──► Build & Test ──► Docker Image ──► Render Deploy
#   Pull Request  ──► Build & Test only (no deploy)
#
# REQUIRED GITHUB SECRETS (Settings → Secrets → Actions):
#   DOCKERHUB_USERNAME   → Your Docker Hub username
#   DOCKERHUB_TOKEN      → Docker Hub Access Token (not password!)
#   RENDER_DEPLOY_HOOK   → Render webhook URL for auto-deploy
# =============================================================

name: Backend CI/CD Pipeline

# ── Triggers ──────────────────────────────────────────────────
on:
  push:
    branches:
      - main                        # Deploy on every merge to main
    paths:
      - 'backend/**'                # Only run if backend files changed
      - '.github/workflows/**'      # Or if the workflow itself changed
  pull_request:
    branches:
      - main                        # Run checks on all PRs to main
    paths:
      - 'backend/**'

# ── Global Environment Variables ──────────────────────────────
env:
  # Docker Hub image name: dockerhub-username/portfolio-backend
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/portfolio-backend

# =============================================================
# JOB 1: Build & Test
# Compiles the Spring Boot app and runs all unit tests
# =============================================================
jobs:
  build-and-test:
    name: 🔨 Build & Test
    runs-on: ubuntu-latest

    steps:
      # ── Step 1: Checkout source code ──────────────────────
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      # ── Step 2: Setup Java 21 (Temurin = Eclipse OpenJDK) ─
      - name: ☕ Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'   # Eclipse Temurin (recommended)
          cache: 'maven'            # Cache ~/.m2 between runs

      # ── Step 3: Cache Maven dependencies ──────────────────
      # This avoids re-downloading JARs on every pipeline run
      - name: 📦 Cache Maven Dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          # Cache key based on pom.xml — invalidates when deps change
          key: ${{ runner.os }}-maven-${{ hashFiles('backend/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      # ── Step 4: Build the project ─────────────────────────
      - name: 🏗️ Build with Maven
        working-directory: backend
        run: mvn clean compile -B
        # -B = batch mode (no interactive prompts, clean CI output)

      # ── Step 5: Run tests ─────────────────────────────────
      # Tests run WITHOUT a real DB — Spring Boot Test uses H2 in-memory
      - name: ✅ Run Tests
        working-directory: backend
        run: mvn test -B
        env:
          # Prevent tests from trying to connect to real TiDB Cloud
          SPRING_PROFILES_ACTIVE: test

      # ── Step 6: Package the JAR ───────────────────────────
      - name: 📦 Package JAR
        working-directory: backend
        run: mvn package -DskipTests -B

      # ── Step 7: Upload JAR as artifact (optional) ─────────
      # Lets you download the compiled JAR from the Actions UI
      - name: 📤 Upload JAR Artifact
        uses: actions/upload-artifact@v4
        with:
          name: portfolio-backend-jar
          path: backend/target/portfolio-backend-*.jar
          retention-days: 7         # Keep for 7 days

  # ===========================================================
  # JOB 2: Docker Build & Push
  # Builds Docker image and pushes to Docker Hub
  # Only runs on push to main (not on pull requests)
  # ===========================================================
  docker-build-push:
    name: 🐳 Docker Build & Push
    runs-on: ubuntu-latest
    needs: build-and-test           # Only run if tests passed
    # Skip this job on pull requests — only deploy from main
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      # ── Step 1: Checkout code ─────────────────────────────
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      # ── Step 2: Setup Java 21 again (needed for Maven package) ─
      - name: ☕ Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      # ── Step 3: Restore Maven cache ───────────────────────
      - name: 📦 Restore Maven Cache
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('backend/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      # ── Step 4: Build JAR for Docker ──────────────────────
      - name: 🏗️ Build JAR for Docker
        working-directory: backend
        run: mvn package -DskipTests -B

      # ── Step 5: Extract metadata for Docker tags ──────────
      # Generates smart tags: latest + short commit SHA
      # e.g., username/portfolio-backend:latest
      #        username/portfolio-backend:abc1234
      - name: 🏷️ Extract Docker Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=,suffix=,format=short

      # ── Step 6: Setup Docker Buildx ───────────────────────
      # Buildx enables advanced builds (multi-arch, cache, etc.)
      - name: 🔧 Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Step 7: Login to Docker Hub ───────────────────────
      # Uses GitHub Secrets — NEVER paste credentials directly!
      - name: 🔐 Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ── Step 8: Build and Push Docker Image ───────────────
      # Builds the image using ./backend/Dockerfile
      # Pushes to Docker Hub with 'latest' and commit SHA tags
      - name: 🚀 Build & Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend         # Build context = backend folder
          file: ./backend/Dockerfile
          push: true                 # Push to Docker Hub
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Layer cache speeds up subsequent builds significantly
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Step 9: Print image digest ────────────────────────
      - name: 📋 Image Digest
        run: echo "Image pushed → ${{ steps.meta.outputs.tags }}"

  # ===========================================================
  # JOB 3: Deploy to Render
  # Triggers Render to pull the new Docker image and redeploy
  # ===========================================================
  deploy-to-render:
    name: 🌐 Deploy to Render
    runs-on: ubuntu-latest
    needs: docker-build-push        # Only run after Docker push succeeds
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      # ── Step 1: Trigger Render Deploy Hook ────────────────
      # Render provides a webhook URL that, when called,
      # pulls the latest Docker image and redeploys the service
      - name: 🚀 Trigger Render Deployment
        run: |
          echo "Triggering Render deployment..."
          curl --silent --show-error --fail \
            "${{ secrets.RENDER_DEPLOY_HOOK }}"
          echo "✅ Render deployment triggered successfully!"

      # ── Step 2: Deployment Summary ────────────────────────
      - name: 📋 Deployment Summary
        run: |
          echo "================================================"
          echo "✅ CI/CD Pipeline Complete!"
          echo "🔖 Commit: ${{ github.sha }}"
          echo "👤 Triggered by: ${{ github.actor }}"
          echo "🌿 Branch: ${{ github.ref_name }}"
          echo "🐳 Image: ${{ env.IMAGE_NAME }}:latest"
          echo "🌐 Backend: Deploying on Render..."
          echo "================================================"
